# ============================================================
# IDMR 牛鞭效应缓解实验 - 统一配置文件
# 论文: 李勇等(2022) 缓解牛鞭效应的新途径：人机协同的智慧决策机器人
# ============================================================

# ------------------------------------------------------------
# 随机性控制 (确保100%可复现)
# ------------------------------------------------------------
seed: 42

# ------------------------------------------------------------
# 供应链参数 (论文公式12)
# ------------------------------------------------------------
supply_chain:
  d: 10              # 需求基础水平 (AR(1)常数项)
  rho: 0.5           # 相关系数 (|rho|<1 保证平稳)
  sigma_eps: 5.0     # 误差标准差, epsilon ~ N(0, sigma^2)
  L: 2               # 运输提前期 (周期)
  p: 5               # SMA移动平均窗口
  z: 2               # 安全库存系数 (z=2 对应SL=97.7%)
  C_L_rho: 2.0       # 预测误差常数
  K: 4               # 供应链层级数
  initial_inventory: 10.0   # 各节点初始库存
  initial_demand: 20.0      # AR(1)初始需求 (d/(1-rho))

# ------------------------------------------------------------
# DQN 超参数 (论文附录表1 + 工程优化)
# ------------------------------------------------------------
dqn:
  state_dim: 5            # 状态维度 [S, WIP, q_down, Trans, q_self]
  action_min: 11          # 动作下界 (论文设定)
  action_max: 40          # 动作上界 (论文设定)
  hidden_dim: 64          # 隐藏层神经元数
  learning_rate: 0.001    # Adam学习率
  gamma: 0.9              # 折扣因子
  batch_size: 32          # 经验回放批大小
  replay_size: 20000      # 经验池容量
  replay_start: 100       # 最小经验数 (开始训练)
  epsilon_start: 1.0      # 探索率初始
  epsilon_end: 0.01       # 探索率终止
  target_update_start: 400   # 目标网络更新起始步
  target_update_freq: 10     # 目标网络更新频率 (步)

# ------------------------------------------------------------
# IDMR 人机协同机制
# ------------------------------------------------------------
idmr:
  node_k: 3                  # IDMR所在节点 (分销商)
  penalty_threshold: 5.0     # 惩罚阈值 (x经典库存均值)
  reward_holding_weight: 0.0001  # 库存惩罚权重
  force_zero_on_penalty: true    # 惩罚触发时强制不订货

  # ===== 创新正向激励机制 (对冲"损失厌恶"导致的过度订货) =====
  # 理论背景:
  #   传统啤酒游戏中,企业因害怕缺货担责(损失厌恶)而过度订货,放大牛鞭效应。
  #   缺货是刚性惩罚(担责),库存积压仅是利润缩水(软约束),缺乏正向激励。
  #   本机制人为引入"库存精准匹配奖励",对冲过度订货倾向。
  # 设计:
  #   当期末库存精准覆盖下期预测需求且无过度积压时,给予正向奖励。
  # 消融实验: 设 enable_inventory_bonus=false 可关闭,对比效果
  enable_inventory_bonus: true       # 是否启用正向激励 (消融实验开关)
  inventory_bonus_weight: 0.3        # 正向激励权重 (与fill_rate同量纲)
  coverage_lower: 0.8                # 库存覆盖下限比例 (NS >= 0.8 * D̂_{t+1})
  coverage_upper: 1.5                # 库存覆盖上限比例 (NS <= 1.5 * D̂_{t+1}, 防积压)
  sma_window: 5                      # 预测下期需求的SMA窗口 (与供应链p一致)
  # 缺货惩罚 (传统刚性惩罚, 保留)
  stockout_penalty_weight: 1.0        # 缺货惩罚权重 (stockout/demand 量纲)

  # ===== 情绪演化模块 (Emotion-Aware) =====
  # 理论背景:
  #   模拟人类决策者的情绪状态对订货决策的影响。
  #   E_t ∈ [-1,1]: <0恐慌(过度订货), >0乐观(精准订货)
  #   情绪演化: E_t = tanh(α·E_{t-1} + γ·Φ_t)
  #   恐慌时放大缺货惩罚, 乐观时放大正向激励
  # 消融实验: enable_emotion=false 关闭情绪模块
  enable_emotion: true               # 是否启用情绪模块
  emotion_alpha: 0.7                # 情绪惯性 (α∈[0,1), 越大越持久)
  emotion_gamma: 2.0                # 情绪敏感度 (对反馈的响应强度)
  emotion_w_stockout: 1.0           # 缺货反馈权重 (负向→恐慌)
  emotion_w_match: 0.5             # 精准匹配反馈权重 (正向→乐观)
  emotion_w_excess: 0.3            # 积压反馈权重 (负向→焦虑)

# ------------------------------------------------------------
# 训练配置
# ------------------------------------------------------------
training:
  total_steps: 40000       # 总训练步数
  log_interval: 2000        # 日志打印间隔 (步)
  eval_steps: 1000          # 评估周期数
  baseline_steps: 20000     # 基线仿真步数

# ------------------------------------------------------------
# 状态归一化缩放因子
# ------------------------------------------------------------
normalization:
  stock_scale: 100.0    # 库存/WIP归一化
  order_scale: 50.0      # 订单/运输归一化

# ------------------------------------------------------------
# 日志与可视化
# ------------------------------------------------------------
logging:
  use_csv: true              # CSV日志 (无依赖, 默认开启)
  use_tensorboard: false     # TensorBoard (需pip install tensorboard)
  log_dir: "./logs"           # 日志目录
  save_model: true            # 保存模型checkpoint
  model_path: "./idmr_model.pkl"
  plot_results: true          # 生成训练曲线图
  plot_path: "./idmr_training_results.png"
